<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Me</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #333;
        }
        p {
            color: #666;
            margin: 0 0 20px 0;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Change the text below to your details -->
        <img src="1689955084042_resized_edited_square.jpg" class="center-image" width="250" height="250">
        <h1>Hunter Figueras</h1>
        <p>Clinical Manager RN 
            <br>
        RUSH MD Anderson Cancer Center</p>
        
        <!-- Replace "yourfile.vcf" with your exact vCard filename -->
        <a href="hunterfigueras.vcf" class="btn" download>Save Contact</a>
    </div>

</body>
</html>
